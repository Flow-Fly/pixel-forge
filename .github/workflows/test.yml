# .github/workflows/test.yml
# Hybrid CI Pipeline: Vitest Unit Tests + E2E Placeholders
# Generated by BMAD Test Architect (Murat)

name: Test Pipeline

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  # Weekly stability check (burn-in)
  schedule:
    - cron: '0 6 * * 1' # Monday 6am UTC

env:
  NODE_VERSION: '24'
  CACHE_KEY: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

jobs:
  # ============================================================
  # STAGE 1: Install & Cache Dependencies
  # ============================================================
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ env.CACHE_KEY }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

  # ============================================================
  # STAGE 2: Type Check & Lint
  # ============================================================
  typecheck:
    name: TypeScript Check
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ env.CACHE_KEY }}

      - name: Run TypeScript check
        run: npx tsc --noEmit

  # ============================================================
  # STAGE 3: Unit Tests (Vitest)
  # ============================================================
  unit-tests:
    name: Unit Tests
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ env.CACHE_KEY }}

      - name: Run unit tests
        run: npm run test:run -- --reporter=verbose --reporter=junit --outputFile=test-results/junit.xml
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 30

  # ============================================================
  # STAGE 4: Coverage Report
  # ============================================================
  coverage:
    name: Test Coverage
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ env.CACHE_KEY }}

      - name: Run coverage
        run: npm run test:coverage -- --reporter=verbose
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ============================================================
  # STAGE 5: Burn-In (Flaky Test Detection)
  # ============================================================
  burn-in:
    name: Burn-In (Flaky Detection)
    needs: [unit-tests, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on PRs and scheduled builds (not every push)
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ env.CACHE_KEY }}

      - name: Detect changed test files
        id: changed-tests
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # Weekly: Run all tests in burn-in
            echo "changed_specs=all" >> $GITHUB_OUTPUT
            echo "Running burn-in on ALL tests (weekly schedule)"
          else
            # PR: Only changed specs
            CHANGED_SPECS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(spec|test)\.(ts|tsx)$' || echo "")
            echo "changed_specs=${CHANGED_SPECS}" >> $GITHUB_OUTPUT
            echo "Changed test files: ${CHANGED_SPECS:-none}"
          fi

      - name: Run burn-in loop (10 iterations)
        run: |
          SPECS="${{ steps.changed-tests.outputs.changed_specs }}"

          if [ -z "$SPECS" ]; then
            echo "No test files changed. Skipping burn-in."
            exit 0
          fi

          echo "Starting burn-in: 10 iterations"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          for i in {1..10}; do
            echo ""
            echo "Burn-in iteration $i/10"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            if [ "$SPECS" == "all" ]; then
              npm run test:run || {
                echo "Burn-in FAILED on iteration $i"
                exit 1
              }
            else
              npm run test:run -- $SPECS || {
                echo "Burn-in FAILED on iteration $i"
                exit 1
              }
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Burn-in PASSED - 10/10 iterations successful"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          CI: true

      - name: Upload burn-in artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            test-results/
            coverage/
          retention-days: 7

  # ============================================================
  # STAGE 6: Build Verification
  # ============================================================
  build:
    name: Build
    needs: [unit-tests, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ env.CACHE_KEY }}

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 7

