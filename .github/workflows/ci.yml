name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Shared workspace checks
        run: npm run shared:check

      - name: Server workspace checks
        run: npm run server:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Fallow audit
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          version: 3.2.0
          artifacts-dir: .fallow/ci
          no-cache: true

  server-container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PIXEL_FORGE_IMAGE_REVISION: ${{ github.sha }}
      PIXEL_FORGE_SMOKE_PROJECT_NAME: pixel-forge-container-smoke-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and smoke the linux/amd64 server image
        run: npm run server:container:smoke
