name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Fallow audit
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          version: 3.2.0
          artifacts-dir: .fallow/ci
          no-cache: true
