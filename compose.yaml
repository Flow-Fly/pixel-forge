services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_PASSWORD: pixel_forge_local_secret
      MINIO_ROOT_USER: pixel_forge
    healthcheck:
      test: ['CMD', 'curl', '--fail', '--silent', 'http://localhost:9000/minio/health/ready']
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - pixel-forge-minio-data:/data

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_PASSWORD: pixel_forge_local_secret
      MINIO_ROOT_USER: pixel_forge
      STORAGE_SAFETY_CONFIRM: local-non-production
    entrypoint:
      - /bin/sh
      - -c
      - |
        test "$$STORAGE_SAFETY_CONFIRM" = "local-non-production"
        mc alias set pixel-forge http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing pixel-forge/pixel-forge-dev
    restart: 'no'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pixel_forge_dev
      POSTGRES_PASSWORD: pixel_forge_local
      POSTGRES_USER: pixel_forge
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pixel_forge -d pixel_forge_dev']
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pixel-forge-postgres-data:/var/lib/postgresql/data

  server:
    image: pixel-forge-server:${PIXEL_FORGE_IMAGE_REVISION:-development}
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.server
    depends_on:
      minio-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      BUILD_REVISION: ${PIXEL_FORGE_IMAGE_REVISION:-development}
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      DATABASE_MAX_CONNECTIONS: '4'
      DATABASE_SAFETY_CONFIRM: non-production
      DATABASE_URL: postgresql://pixel_forge:pixel_forge_local@postgres:5432/pixel_forge_dev
      HOST: 0.0.0.0
      PORT: '3001'
      STORAGE_ACCESS_KEY_ID: pixel_forge
      STORAGE_BUCKET: pixel-forge-dev
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_FORCE_PATH_STYLE: 'true'
      STORAGE_INSECURE_HTTP_CONFIRM: local-container-network
      STORAGE_REGION: us-east-1
      STORAGE_SECRET_ACCESS_KEY: pixel_forge_local_secret
    ports:
      - '127.0.0.1:3001:3001'
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
    restart: 'no'

volumes:
  pixel-forge-minio-data:
  pixel-forge-postgres-data:
